### ResNet34 parameter-matched control.
### Adds a non-age residual MLP/gate after the ResNet34 embedding to roughly
### match ACSM parameter count. It does not use age labels, age posterior,
### ordered canonicalization, or ACSM losses.

exp_dir: exp/ResNet34-ParamMatch-TSTP-emb256-fbank80
key_filter_file: data/baseline/vox2_train_voxca/key.list
gpus: "[0,1,2,3]"
num_avg: 10
enable_amp: False

seed: 3407
num_epochs: 150
save_epoch_interval: 5
log_batch_interval: 100

dataloader_args:
  batch_size: 96
  num_workers: 8
  pin_memory: False
  prefetch_factor: 8
  drop_last: True

dataset_args:
  sample_num_per_epoch: 0
  shuffle: True
  shuffle_args:
    shuffle_size: 2500
  filter: True
  filter_args:
    min_num_frames: 100
    max_num_frames: 800
  resample_rate: 16000
  speed_perturb: True
  num_frms: 200
  aug_prob: 0.6
  fbank_args:
    num_mel_bins: 80
    frame_shift: 10
    frame_length: 25
    dither: 1.0
  spec_aug: False
  spec_aug_args:
    num_t_mask: 1
    num_f_mask: 1
    max_t: 10
    max_f: 8
    prob: 0.6

model: ResNet34_ParamMatch
model_init: null
model_init_strict: false
model_args:
  feat_dim: 80
  embed_dim: 256
  pooling_func: "TSTP"
  two_emb_layer: False
  param_match_args:
    bottleneck_dim: 64
    residual_scale: 0.1

projection_args:
  project_type: "arc_margin"
  scale: 48.0
  easy_margin: False

margin_scheduler: MarginScheduler
margin_update:
  initial_margin: 0.2
  final_margin: 0.2
  increase_start_epoch: 1
  fix_start_epoch: 1
  update_margin: False
  increase_type: "exp"

loss: CrossEntropyLoss
loss_args: {}

optimizer: SGD
optimizer_args:
  momentum: 0.9
  nesterov: True
  weight_decay: 0.0001

scheduler: ExponentialDecrease
scheduler_args:
  initial_lr: 0.016666666666666666
  final_lr: 0.000008333333333333334
  warm_up_epoch: 6
  warm_from_zero: True
