### baseline plus OAM and ORC.

exp_dir: exp/Baseline-ResNet34-OAM-ORC
key_filter_file: data/baseline/vox2_train_voxca/key.list
gpus: "[0,1,2,3]"
num_avg: 10
enable_amp: False

seed: 3407
num_epochs: 150
save_epoch_interval: 5
log_batch_interval: 100

dataloader_args:
  batch_size: 96
  num_workers: 16
  pin_memory: False
  prefetch_factor: 8
  drop_last: True

dataset_args:
  sample_num_per_epoch: 0
  shuffle: True
  shuffle_args:
    shuffle_size: 2500
  filter: True
  filter_args:
    min_num_frames: 100
    max_num_frames: 800
  resample_rate: 16000
  speed_perturb: True
  num_frms: 200
  aug_prob: 0.6
  fbank_args:
    num_mel_bins: 80
    frame_shift: 10
    frame_length: 25
    dither: 1.0
  spec_aug: False
  spec_aug_args:
    num_t_mask: 1
    num_f_mask: 1
    max_t: 10
    max_f: 8
    prob: 0.6

model: ResNet34
model_init: null
model_args:
  feat_dim: 80
  embed_dim: 256
  pooling_func: "TSTP"
  two_emb_layer: False

projection_args:
  project_type: "arc_margin"
  scale: 48.0
  easy_margin: False

margin_scheduler: MarginScheduler
margin_update:
  initial_margin: 0.2
  final_margin: 0.2
  increase_start_epoch: 1
  fix_start_epoch: 1
  update_margin: False
  increase_type: "exp"

loss: CrossEntropyLoss
loss_args: {}

optimizer: SGD
optimizer_args:
  momentum: 0.9
  nesterov: True
  weight_decay: 0.0001

scheduler: ExponentialDecrease
scheduler_args:
  initial_lr: 0.016666666666666666
  final_lr: 0.000008333333333333334
  warm_up_epoch: 6
  warm_from_zero: True

aorc_args:
  age_label_file: /xmudata/pzj/vox-ca/vox2dev/segment2age.npy
  age_label_type: value
  age_bins: [25, 30, 35, 45, 55]
  age_mode: ordinal
  enable_oam: True
  enable_orc: True
  enable_caa: False
  ignore_age_index: -1
  lambda_oam: 0.1
  alpha_proxy: 0.1
  beta_dir: 0.05
  lambda_smooth: 1.0e-3
  tau_proxy: 0.1
  lambda_proto_dist: 1.0
  beta_gap: 1.0
  residual_scale: 0.1
  learnable_residual_scale: False
  detach_age_prob_for_residual: True
  max_dir_pairs: null
