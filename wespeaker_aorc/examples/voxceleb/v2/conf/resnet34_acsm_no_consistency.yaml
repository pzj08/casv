### ACSM ablation: no raw/canonical consistency.
### Disables the ordinary-SV protection loss to measure whether consistency is
### needed to prevent canonicalization drift.

exp_dir: exp/ACSM-ResNet34-no-consistency-TSTP-emb256-fbank80
key_filter_file: data/baseline/vox2_train_voxca/key.list
gpus: "[0,1,2,3]"
num_avg: 10
enable_amp: False

seed: 3407
num_epochs: 150
save_epoch_interval: 5
log_batch_interval: 100

dataloader_args:
  batch_size: 96
  num_workers: 8
  pin_memory: False
  prefetch_factor: 8
  drop_last: True

dataset_args:
  sample_num_per_epoch: 0
  shuffle: True
  shuffle_args:
    shuffle_size: 2500
  filter: True
  filter_args:
    min_num_frames: 100
    max_num_frames: 800
  resample_rate: 16000
  speed_perturb: True
  num_frms: 200
  aug_prob: 0.6
  fbank_args:
    num_mel_bins: 80
    frame_shift: 10
    frame_length: 25
    dither: 1.0
  spec_aug: False
  spec_aug_args:
    num_t_mask: 1
    num_f_mask: 1
    max_t: 10
    max_f: 8
    prob: 0.6

model: ResNet34_ACSM
model_init: null
model_init_strict: false
model_args:
  feat_dim: 80
  embed_dim: 256
  pooling_func: "TSTP"
  two_emb_layer: False
  acsm_args:
    enabled: true
    num_age_groups: 7
    age_bins: [21, 31, 41, 51, 61, 71]
    age_label_file: /xmudata/pzj/vox-ca/vox2dev/segment2age.npy
    age_label_type: value
    ignore_age_index: -1
    reference_age_group: 3
    age_observer_stage: layer2
    age_emb_dim: 128
    film:
      enabled: true
      stages: ["layer3", "layer4"]
      film_scale: 0.05
    canonicalizer:
      enabled: true
      canonical_scale: 0.1
      learnable_canonical_scale: false
      gate_max: 0.5
      gate_init_bias: -2.0
      transition_init_std: 0.005
    losses:
      lambda_age: 0.1
      lambda_consistency: 0.0
      lambda_smooth: 1.0e-4
      lambda_path: 0.0
      ramp_epoch: 2
    consistency:
      mode: embedding
      small_age_gap: 1
      only_small_age_gap: false
    diagnostics:
      strict_finite_check: true
      log_diagnostics: true

projection_args:
  project_type: "arc_margin"
  scale: 48.0
  easy_margin: False

margin_scheduler: MarginScheduler
margin_update:
  initial_margin: 0.2
  final_margin: 0.2
  increase_start_epoch: 1
  fix_start_epoch: 1
  update_margin: False
  increase_type: "exp"

loss: CrossEntropyLoss
loss_args: {}

optimizer: SGD
optimizer_args:
  momentum: 0.9
  nesterov: True
  weight_decay: 0.0001

scheduler: ExponentialDecrease
scheduler_args:
  initial_lr: 0.016666666666666666
  final_lr: 0.000008333333333333334
  warm_up_epoch: 6
  warm_from_zero: True
